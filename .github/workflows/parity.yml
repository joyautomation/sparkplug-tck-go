name: parity

on:
  schedule:
    # Daily 04:00 UTC — catches regressions in either engine within a day.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  diff:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Stage upstream HiveMQ home
        # Pulls the upstream tarball, runs gradle :tck:prepareHivemqHome
        # to assemble a self-contained HiveMQ install with the TCK
        # extension wired in. Cached between runs by gradle's own cache.
        run: |
          bash scripts/update-upstream-inventory.sh
          cd .upstream-tck-cache/sparkplug-master
          ./gradlew :tck:prepareHivemqHome

      - name: Run upstream Java TCK against synthetic SUT
        # HiveMQ persistence wedges after long-running tests (QoS1 ack
        # timeouts on subsequent startTest). Bounce the broker between
        # every test to keep state pristine.
        run: |
          go build ./cmd/sparkplug-tck-correctness
          tests=(
            "edge SessionEstablishmentTest"
            "edge SendDataTest"
            "edge SendComplexDataTest"
            "edge SessionTerminationTest"
            "edge ReceiveCommandTest"
            "edge PrimaryHostTest"
            "host SessionEstablishmentTest"
            "host SessionTerminationTest"
            "host EdgeSessionTerminationTest"
            "host MessageOrderingTest"
            "host SendCommandTest"
          )
          mkdir -p .parity-per-test
          for t in "${tests[@]}"; do
            slug="$(echo "$t" | tr ' /' '__')"
            echo "::group::$t"
            bash scripts/upstream-tck/start-hivemq.sh
            ./sparkplug-tck-correctness -tests "$t" > ".parity-per-test/${slug}.json" || true
            bash scripts/upstream-tck/stop-hivemq.sh || true
            # Wipe persistence so the next start is truly fresh.
            rm -rf .upstream-tck-cache/sparkplug-master/tck/build/hivemq-home/data || true
            echo "::endgroup::"
          done
          # Merge per-test reports into a single java.json (same shape
          # as a single full-sweep run: {"tests":[...]}).
          python3 - <<'PY'
          import json, glob
          merged = []
          for path in sorted(glob.glob('.parity-per-test/*.json')):
              try:
                  data = json.load(open(path))
              except Exception:
                  continue
              merged.extend(data.get('tests') or [])
          json.dump({'tests': merged}, open('java.json', 'w'), indent=2)
          PY

      - name: Run Go bench
        run: |
          go build ./cmd/sparkplug-tck-bench
          ./sparkplug-tck-bench -json > go.json

      - name: Diff Java vs Go verdicts
        run: |
          go build ./cmd/sparkplug-tck-diff
          ./sparkplug-tck-diff -java java.json -go go.json -json > diff.json
          python3 - <<'PY'
          import json, sys
          d = json.load(open('diff.json'))
          o = d['overall']
          conflicts = o.get('disagree', 0)
          agree = o.get('agree', 0)
          coverage = o.get('coverage', 0)
          pct = float(o.get('logic_agreement_pct', 0))
          tests = d.get('tests') or []
          infra = [t['test'] for t in tests if t.get('overall') == 'INFRA_FAILED']
          ok = [t for t in tests if t.get('overall') != 'INFRA_FAILED']
          print(f"agree={agree} conflict={conflicts} coverage={coverage} logic_agreement={pct:.1f}%")
          print(f"tests: {len(ok)} graded, {len(infra)} infra-failed: {infra}")
          # Fail on any logic conflict. Coverage Δ is fine — it's the
          # per-test/per-profile scoping artefact, not a real disagreement.
          if conflicts > 0:
              sys.exit(f"{conflicts} logic conflict(s) — see diff.json artefact")
          if pct < 99.0:
              sys.exit(f"logic agreement {pct:.1f}% < floor 99%")
          # With per-test HiveMQ bouncing, infra failures should be 0.
          # Tolerate 1 in case of a one-off boot hiccup.
          if len(infra) > 1:
              sys.exit(f"{len(infra)} infra-failed tests, likely env wedged: {infra}")
          PY

      - name: Tear down HiveMQ
        if: always()
        run: bash scripts/upstream-tck/stop-hivemq.sh || true

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-verdicts
          path: |
            java.json
            go.json
            diff.json
