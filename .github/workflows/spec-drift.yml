name: spec-drift

on:
  schedule:
    # Mondays 09:00 UTC — weekly is plenty for a spec that doesn't move often.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Regenerate assertions.json from upstream spec
        run: bash scripts/update-assertions.sh

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet -- assertions.json; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "No spec drift."
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected. Diff:"
            git diff --stat -- assertions.json
          fi

      - name: Open PR with refreshed catalog
        if: steps.drift.outputs.drifted == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: spec-drift/refresh
          title: "spec: refresh assertions.json from upstream"
          commit-message: |
            spec: refresh assertions.json from upstream

            Auto-generated by .github/workflows/spec-drift.yml from the
            current eclipse-sparkplug/sparkplug master. Review the diff
            for new/renamed/removed [tck-id-*] entries before merging.
          body: |
            Auto-generated by `spec-drift` workflow.

            The Sparkplug spec asciidoc on `eclipse-sparkplug/sparkplug@master`
            now produces a different `assertions.json` than what's checked in.
            Review the diff for new, renamed, or removed `[tck-id-*]` entries.

            If new IDs need wiring, follow up with assertion or harness work.
          delete-branch: true
